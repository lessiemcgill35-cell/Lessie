<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pepper Dash</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="game-shell">
    <h1>Pepper Dash</h1>
    <p class="subtitle">A fast, cartoony platformer inspired by Pizza Tower.</p>
    <canvas id="game" width="960" height="540" aria-label="Pepper Dash game canvas"></canvas>
    <section class="hud">
      <div><strong>Controls:</strong> A/D move, Space jump, Shift dash, E taunt</div>
      <div id="status"></div>
    </section>
  </main>
  <script src="game.js"></script>
</body>
</html>
